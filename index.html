<!-- ─── animations.jsx ──────────────────────────────────────────────────── -->
<script type="text/babel">

// ── Easing functions ─────────────────────────────────────────────────────────
const Easing = {
  linear: (t) => t,
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0; if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0; if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        return output[i] + (output[i + 1] - output[i]) * easeFn(local);
      }
    }
    return output[output.length - 1];
  };
}

function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    return from + (to - from) * ease((t - start) / (end - start));
  };
}

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;
  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration) ? clamp(localTime / duration, 0, 1) : 0;
  const value = { localTime, progress, duration, visible };
  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

function TextSprite({
  text, x = 0, y = 0, size = 48, color = '#111',
  font = 'Inter, system-ui, sans-serif', weight = 600,
  entryDur = 0.45, exitDur = 0.35,
  entryEase = Easing.easeOutBack, exitEase = Easing.easeInCubic,
  align = 'left', letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);
  let opacity = 1, ty = 0;
  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t; ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t; ty = -t * 8;
  }
  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';
  return (
    <div style={{
      position: 'absolute', left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity, fontFamily: font, fontSize: size, fontWeight: weight,
      color, letterSpacing, whiteSpace: 'pre', lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>{text}</div>
  );
}

function ImageSprite({
  src, x = 0, y = 0, width = 400, height = 300,
  entryDur = 0.6, exitDur = 0.4, kenBurns = false,
  kenBurnsScale = 1.08, radius = 12, fit = 'cover', placeholder = null,
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);
  let opacity = 1, scale = 1;
  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t; scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t; scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }
  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458', fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13, letterSpacing: '0.04em', textTransform: 'uppercase',
    }}>{placeholder.label || 'image'}</div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );
  return (
    <div style={{
      position: 'absolute', left: x, top: y, width, height,
      opacity, transform: `scale(${scale})`, transformOrigin: 'center',
      borderRadius: radius, overflow: 'hidden', willChange: 'transform, opacity',
    }}>{content}</div>
  );
}

function RectSprite({ x = 0, y = 0, width = 100, height = 100, color = '#111', radius = 8, entryDur = 0.4, exitDur = 0.3, render }) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);
  let opacity = 1, scale = 1;
  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1); scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t; scale = 1 - 0.15 * t;
  }
  const overrides = render ? render(spriteCtx) : {};
  return (
    <div style={{
      position: 'absolute', left: x, top: y, width, height,
      background: color, borderRadius: radius, opacity,
      transform: `scale(${scale})`, transformOrigin: 'center',
      willChange: 'transform, opacity', ...overrides,
    }} />
  );
}

function Stage({
  width = 1280, height = 720, duration = 10,
  background = '#f6f4ef', fps = 60, loop = true,
  autoplay = true, persistKey = 'animstage', children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);
  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44;
      const s = Math.min(el.clientWidth / width, (el.clientHeight - barH) / height);
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) { lastTsRef.current = null; return; }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); lastTsRef.current = null; };
  }, [playing, duration, loop]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') { e.preventDefault(); setPlaying(p => !p); }
      else if (e.code === 'ArrowLeft') setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.code === 'ArrowRight') setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.key === '0' || e.code === 'Home') setTime(0);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;
  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div ref={stageRef} style={{
      position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      background: '#0a0a0a', fontFamily: 'Inter, system-ui, sans-serif',
    }}>
      <div style={{
        flex: 1, width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden', minHeight: 0,
      }}>
        <div ref={canvasRef} style={{
          width, height, background, position: 'relative',
          transform: `scale(${scale})`, transformOrigin: 'center',
          flexShrink: 0, boxShadow: '0 20px 60px rgba(0,0,0,0.4)', overflow: 'hidden',
        }}>
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>
      <PlaybackBar
        time={displayTime} actualTime={time} duration={duration} playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => setTime(0)}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    return clamp((e.clientX - rect.left) / rect.width, 0, 1) * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) onSeek(t); else onHover(t);
  };
  const onTrackLeave = () => { if (!dragging) onHover(null); };
  const onTrackDown = (e) => { setDragging(true); onSeek(timeFromEvent(e)); onHover(null); };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => { if (trackRef.current) onSeek(timeFromEvent(e)); };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mouseup', onUp); window.removeEventListener('mousemove', onMove); };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  };
  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%', maxWidth: 680, alignSelf: 'center',
      borderRadius: 8, color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none', flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>
      <div style={{ fontFamily: mono, fontSize: 12, fontVariantNumeric: 'tabular-nums', width: 64, textAlign: 'right', color: '#f6f4ef' }}>
        {fmt(time)}
      </div>
      <div
        ref={trackRef}
        onMouseMove={onTrackMove} onMouseLeave={onTrackLeave} onMouseDown={onTrackDown}
        style={{ flex: 1, height: 22, position: 'relative', cursor: 'pointer', display: 'flex', alignItems: 'center' }}
      >
        <div style={{ position: 'absolute', left: 0, right: 0, height: 4, background: 'rgba(255,255,255,0.12)', borderRadius: 2 }}/>
        <div style={{ position: 'absolute', left: 0, width: `${pct}%`, height: 4, background: 'oklch(72% 0.12 250)', borderRadius: 2 }}/>
        <div style={{
          position: 'absolute', left: `${pct}%`, top: '50%',
          width: 12, height: 12, marginLeft: -6, marginTop: -6,
          background: '#fff', borderRadius: 6, boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>
      <div style={{ fontFamily: mono, fontSize: 12, fontVariantNumeric: 'tabular-nums', width: 64, textAlign: 'left', color: 'rgba(246,244,239,0.55)' }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} title={title}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)', borderRadius: 6,
        color: '#f6f4ef', cursor: 'pointer', padding: 0, transition: 'background 120ms',
      }}
    >{children}</button>
  );
}

Object.assign(window, {
  Easing, interpolate, animate, clamp,
  TimelineContext, useTime, useTimeline,
  Sprite, SpriteContext, useSprite,
  TextSprite, ImageSprite, RectSprite,
  Stage, PlaybackBar,
});
</script>

<script type="text/babel">

const INK   = '#3D3938';
const PAPER = '#F5F5F5';
const DIM   = '#8a8481';
const RULE  = '#d9d5d1';
const CYAN  = '#7EC0C8';
const GOLD  = '#EFB243';
const PINK  = '#EA4E86';

const HELV = '"Poppins", "Helvetica Neue", Helvetica, Arial, sans-serif';
const BODY = '"Montserrat", "Helvetica Neue", Helvetica, Arial, sans-serif';

function HUD({ index, total, label }) {
  return (
    <div style={{
      position: 'absolute', left: 40, top: 32,
      display: 'flex', alignItems: 'center', gap: 14,
      fontFamily: HELV, color: INK, zIndex: 50,
    }}>
      <div style={{ fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', fontWeight: 700 }}>
        eduLAB · Échelles cosmiques
      </div>
      <div style={{ width: 1, height: 14, background: INK, opacity: 0.4 }}/>
      <div style={{ fontSize: 11, letterSpacing: '0.18em', textTransform: 'uppercase', color: DIM, fontWeight: 500 }}>
        {String(index).padStart(2,'0')} / {String(total).padStart(2,'0')} · {label}
      </div>
    </div>
  );
}

function ScaleRuler({ logMeters, label }) {
  const min = 6, max = 27;
  const t = clamp((logMeters - min) / (max - min), 0, 1);
  return (
    <div style={{ position: 'absolute', left: 40, right: 40, bottom: 36, fontFamily: HELV, color: INK, zIndex: 50 }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between',
        fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase',
        color: DIM, marginBottom: 8, fontWeight: 500,
      }}>
        <span>10⁶ m</span>
        <span>{label}</span>
        <span>10²⁷ m</span>
      </div>
      <div style={{ position: 'relative', height: 2, background: RULE }}>
        <div style={{ position: 'absolute', left: 0, top: 0, height: 2, width: `${t * 100}%`, background: INK }}/>
        {Array.from({ length: max - min + 1 }, (_, i) => (
          <div key={i} style={{
            position: 'absolute', left: `${(i / (max - min)) * 100}%`,
            top: -3, width: 1, height: 8,
            background: i / (max - min) < t ? INK : RULE,
            transform: 'translateX(-0.5px)',
          }}/>
        ))}
        <div style={{
          position: 'absolute', left: `${t * 100}%`, top: -6,
          width: 14, height: 14, marginLeft: -7,
          borderRadius: 7, background: PAPER, border: `2px solid ${INK}`,
        }}/>
      </div>
    </div>
  );
}

function Body({ cx, cy, d, fill = INK, stroke = null, label, labelOffset = [0, 0], labelAlign = 'center', subLabel }) {
  return (
    <>
      <div style={{
        position: 'absolute', left: cx - d/2, top: cy - d/2,
        width: d, height: d, borderRadius: '50%',
        background: fill,
        border: stroke ? `1.5px solid ${stroke}` : 'none',
        boxSizing: 'border-box',
      }}/>
      {label && (
        <div style={{
          position: 'absolute',
          left: cx + labelOffset[0], top: cy + labelOffset[1],
          transform: labelAlign === 'center' ? 'translate(-50%, 0)' :
                     labelAlign === 'right'  ? 'translate(-100%, 0)' : 'translate(0, 0)',
          fontFamily: HELV, fontSize: 13, letterSpacing: '0.18em',
          textTransform: 'uppercase', fontWeight: 700, color: INK,
        }}>
          {label}
          {subLabel && (
            <div style={{ fontSize: 10, letterSpacing: '0.14em', color: DIM, fontWeight: 500, marginTop: 3 }}>
              {subLabel}
            </div>
          )}
        </div>
      )}
    </>
  );
}

function FactBlock({ top, eyebrow, figure, figureUnit, body, figureColor }) {
  return (
    <div style={{ position: 'absolute', left: 40, top, right: 40, fontFamily: HELV, color: INK }}>
      {eyebrow && (
        <div style={{ fontSize: 11, letterSpacing: '0.24em', textTransform: 'uppercase', fontWeight: 700, color: DIM, marginBottom: 14 }}>
          {eyebrow}
        </div>
      )}
      {figure && (
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 16, marginBottom: 12 }}>
          <div style={{ fontSize: 120, fontWeight: 700, lineHeight: 0.9, letterSpacing: '-0.04em', color: figureColor || INK }}>
            {figure}

}

// ─── Scene 04: Jupiter ──────────────────────────────────────────────────────
function SceneJupiter({ start, dur }) {
  return (
    <Sprite start={start} end={start + dur}>
      {({ localTime }) => {
        const inOut = interpolate([0, 0.6, dur - 0.5, dur], [0, 1, 1, 0])(localTime);
        const packProgress = interpolate([0.5, 3.5], [0, 1], Easing.easeOutCubic)(localTime);
        const cx = 1200, cy = 540, jupiterR = 260, earthR = jupiterR / 11;
        const dots = [];
        const step = earthR * 2 + 2;
        let count = 0;
        for (let y = cy - jupiterR + earthR; y <= cy + jupiterR - earthR; y += step) {
          for (let x = cx - jupiterR + earthR; x <= cx + jupiterR - earthR; x += step) {
            const dx = x - cx, dy = y - cy;
            if (dx*dx + dy*dy <= (jupiterR - earthR) ** 2) { dots.push({ x, y, i: count }); count++; }
          }
        }
        const total = dots.length;
        return (
          <div style={{ position: 'absolute', inset: 0, opacity: inOut }}>
            <HUD index={4} total={8} label="Jupiter" />
            <div style={{ position: 'absolute', left: cx - jupiterR, top: cy - jupiterR, width: jupiterR*2, height: jupiterR*2, borderRadius: '50%', border: `1.5px solid ${INK}`, boxSizing: 'border-box' }}/>
            {[0.25, 0.5, 0.75].map(f => (
              <div key={f} style={{ position: 'absolute', left: cx - jupiterR, top: cy - jupiterR + jupiterR*2*f, width: jupiterR*2, height: 1, background: RULE, opacity: 0.6 }}/>
            ))}
            {dots.map((d, i) => {
              const visible = i < Math.floor(total * packProgress);
              return (
                <div key={i} style={{
                  position: 'absolute', left: d.x - earthR, top: d.y - earthR,
                  width: earthR*2, height: earthR*2, borderRadius: '50%',
                  background: INK, opacity: visible ? 1 : 0, transition: 'opacity 120ms linear',
                }}/>
              );
            })}
            <Body cx={420} cy={540} d={earthR * 4} fill={INK} label="UNE TERRE" labelOffset={[0, earthR * 2 + 20]} />
            <div style={{ position: 'absolute', left: 420, top: 540 - earthR*2 - 20, transform: 'translate(-50%, -100%)', fontFamily: HELV, fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', fontWeight: 700, color: DIM }}>
              agrandie 2× pour lisibilité
            </div>
            <div style={{ position: 'absolute', left: cx, top: cy + jupiterR + 24, transform: 'translate(-50%, 0)', fontFamily: HELV, fontSize: 13, letterSpacing: '0.2em', textTransform: 'uppercase', fontWeight: 700, color: INK }}>
              Jupiter · {Math.floor(total * packProgress)} / {total}+ Terres
            </div>
            <FactBlock top={100} figureColor="#EA4E86"
              eyebrow="Fait 04 · Géante gazeuse"
              figure="1,321" figureUnit="Terres en volume"
              body="Jupiter est plus du double de la masse de toutes les autres planètes réunies. Sa Grande Tache rouge — une seule tempête — fait rage depuis au moins 350 ans et pourrait engloutir la Terre entière."
            />
            <ScaleRuler logMeters={8.16} label="Diamètre Jupiter · 1,4×10⁸ m" />
          </div>
        );
      }}
    </Sprite>
  );
}

// ─── Scene 07: Galaxy ───────────────────────────────────────────────────────
function SceneGalaxy({ start, dur }) {
  return (
    <Sprite start={start} end={start + dur}>
      {({ localTime }) => {
        const inOut = interpolate([0, 0.7, dur - 0.5, dur], [0, 1, 1, 0])(localTime);
        const cx = 960, cy = 560;
        const spiralProgress = interpolate([0, 3.5], [0, 1], Easing.easeOutCubic)(localTime);
        const rotate = (localTime / dur) * 0.4;
        const dots = [];
        const N = 900;
        for (let i = 0; i < N; i++) {
          const frac = i / N;
          const arm = i % 2;
          const angle = frac * Math.PI * 6 + arm * Math.PI + rotate;
          const radius = 40 + frac * 360;
          const j = ((i * 17) % 40) - 20;
          const jr = ((i * 31) % 30) - 15;
          const r = radius + jr;
          dots.push({ x: cx + Math.cos(angle)*r + j*0.5, y: cy + Math.sin(angle)*r*0.35 + j*0.3, size: frac < 0.15 ? 2 : 1, frac });
        }
        const visibleN = Math.floor(N * spiralProgress);
        const bulgeR = 70;
        const youAngle = Math.PI * 0.3 + rotate;
        const youR = 240;
        const youX = cx + Math.cos(youAngle) * youR;
        const youY = cy + Math.sin(youAngle) * youR * 0.35;
        return (
          <div style={{ position: 'absolute', inset: 0, opacity: inOut }}>
            <HUD index={7} total={8} label="Voie lactée" />
            <div style={{ position: 'absolute', left: cx - bulgeR*2, top: cy - bulgeR, width: bulgeR*4, height: bulgeR*2, borderRadius: '50%', background: GOLD, opacity: 0.25, filter: 'blur(20px)' }}/>
            <div style={{ position: 'absolute', left: cx - bulgeR, top: cy - bulgeR*0.5, width: bulgeR*2, height: bulgeR, borderRadius: '50%', background: INK }}/>
            {dots.slice(0, visibleN).map((d, i) => (
              <div key={i} style={{ position: 'absolute', left: d.x, top: d.y, width: d.size, height: d.size, borderRadius: '50%', background: INK, opacity: d.frac < 0.2 ? 1 : 0.7 }}/>
            ))}
            {localTime > 2.5 && (
              <>
                <div style={{ position: 'absolute', left: youX - 5, top: youY - 5, width: 10, height: 10, borderRadius: '50%', border: `2px solid ${INK}`, background: PAPER, opacity: interpolate([2.5, 3], [0, 1])(localTime) }}/>
                <div style={{ position: 'absolute', left: youX + 12, top: youY - 8, fontFamily: HELV, fontSize: 11, letterSpacing: '0.2em', textTransform: 'uppercase', fontWeight: 700, color: INK, opacity: interpolate([2.5, 3], [0, 1])(localTime) }}>
                  Vous êtes ici
                  <div style={{ fontSize: 9, letterSpacing: '0.14em', color: DIM, marginTop: 2, fontWeight: 500 }}>26 000 AL du centre</div>
                </div>
              </>
            )}
            {localTime > 3 && (
              <div style={{ position: 'absolute', left: cx, top: cy + 200, transform: 'translate(-50%, 0)', fontFamily: HELV, fontSize: 11, letterSpacing: '0.22em', textTransform: 'uppercase', fontWeight: 700, color: INK, opacity: interpolate([3, 3.5], [0, 1])(localTime) }}>
                ⟵ 100 000 années-lumière ⟶
              </div>
            )}
            <FactBlock top={90} figureColor="#EA4E86"
              eyebrow="Fait 07 · Notre galaxie"
              figure="100–400" figureUnit="milliards d'étoiles"
              body="En comptant une étoile par seconde, il vous faudrait plus de 3 000 ans pour toutes les énumérer. Et la Voie lactée n'est qu'une galaxie parmi deux mille milliards."
            />
            <ScaleRuler logMeters={21} label="Voie lactée · 10²¹ m" />
          </div>
        );
      }}
    </Sprite>
  );
}

// ─── Scene 08: Universe ─────────────────────────────────────────────────────
function SceneUniverse({ start, dur }) {
  return (
    <Sprite start={start} end={start + dur}>
      {({ localTime }) => {
        const inOut = interpolate([0, 0.7, dur - 0.5, dur], [0, 1, 1, 0])(localTime);
        const cx = 960, cy = 540;
        const rings = [];
        for (let r = 60; r < 440; r += 12) {
          const count = Math.floor(r * 0.6);
          for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2 + r * 0.01;
            const jitter = ((i * 37 + r * 13) % 20) - 10;
            const rr = r + jitter * 0.6;
            rings.push({ x: cx + Math.cos(angle)*rr, y: cy + Math.sin(angle)*rr, size: ((i+r) % 3) + 1, depth: r/440 });
          }
        }
        const zoomOut = interpolate([0, 3.5], [0.3, 1], Easing.easeInOutCubic)(localTime);
        const visibleN = Math.floor(rings.length * interpolate([0, 3], [0, 1], Easing.easeOutCubic)(localTime));
        return (
          <div style={{ position: 'absolute', inset: 0, opacity: inOut }}>
            <HUD index={8} total={8} label="Univers observable" />

// ─── Scene 10: Zoom Back ────────────────────────────────────────────────────
function SceneZoomBack({ start, dur }) {
  return (
    <Sprite start={start} end={start + dur}>
      {({ localTime }) => {
        const inOut = interpolate([0, 0.5, dur - 0.5, dur], [0, 1, 1, 0])(localTime);
        const steps = [
          { log: 27,    name: 'Univers observable', sub: '10²⁷ m',      color: INK },
          { log: 21,    name: 'Voie lactée',        sub: '10²¹ m',      color: INK },
          { log: 16.6,  name: 'Proxima Centauri',   sub: '4×10¹⁶ m',   color: INK },
          { log: 11.17, name: 'Système solaire',    sub: '1,5×10¹¹ m', color: INK },
          { log: 9.14,  name: 'Le Soleil',          sub: '1,39×10⁹ m', color: INK },
          { log: 7,     name: 'La Terre',           sub: '1,27×10⁷ m', color: INK },
          { log: 5.5,   name: 'La Belgique',        sub: '~3×10⁵ m',   color: INK },
          { log: 4.3,   name: 'Charleroi',          sub: '~2×10⁴ m',   color: INK },
          { log: 2.0,   name: 'eduLAB',             sub: '~1×10² m',   color: CYAN },
        ];
        const settleTime = dur - 1.2;
        const rawProg = Math.min(localTime / settleTime, 1);
        const eased = Easing.easeInOutCubic(rawProg);
        const idxF = eased * (steps.length - 1);
        const idx = Math.floor(idxF);
        const frac = idxF - idx;
        const current = steps[idx];
        const next = steps[Math.min(idx + 1, steps.length - 1)];
        const logNow = current.log + (next.log - current.log) * frac;
        const activeName = frac < 0.5 ? current.name : next.name;
        const activeSub  = frac < 0.5 ? current.sub  : next.sub;
        const activeColor = frac < 0.5 ? current.color : next.color;
        const stepFade = Math.abs(0.5 - frac) * 2;
        const ordersLeft = Math.max(0, logNow - 2.0);
        return (
          <div style={{ position: 'absolute', inset: 0, opacity: inOut }}>
            <HUD index={9} total={10} label="Retour vers vous" />
            <div style={{ position: 'absolute', top: 140, right: 100, textAlign: 'right', fontFamily: HELV, color: INK }}>
              <div style={{ fontSize: 13, letterSpacing: '0.32em', textTransform: 'uppercase', fontWeight: 700, color: DIM, marginBottom: 14 }}>Retour à la maison</div>
              <div style={{ fontSize: 52, fontWeight: 700, letterSpacing: '-0.02em', lineHeight: 1.0, color: INK, maxWidth: 640 }}>
                Maintenant,<br/>dans l'autre sens.
              </div>
              <div style={{ marginTop: 18, fontFamily: BODY, fontSize: 17, lineHeight: 1.55, color: DIM, maxWidth: 560, marginLeft: 'auto' }}>
                De 10<sup>27</sup> m jusqu'à un bâtiment précis. Regardez l'échelle fondre.
              </div>
            </div>
            <div style={{ position: 'absolute', left: 100, top: '50%', transform: 'translate(0, -50%)', fontFamily: HELV, color: INK, maxWidth: 900 }}>
              <div style={{ fontSize: 13, letterSpacing: '0.32em', textTransform: 'uppercase', fontWeight: 700, color: DIM, marginBottom: 20 }}>Actuellement</div>
              <div style={{ fontSize: 120, fontWeight: 700, letterSpacing: '-0.04em', lineHeight: 0.95, color: activeColor, opacity: stepFade, transform: `translateY(${(1 - stepFade) * 14}px)`, transition: 'none' }}>
                {activeName}
              </div>
              <div style={{ marginTop: 18, fontSize: 22, letterSpacing: '0.14em', fontWeight: 500, color: DIM, opacity: stepFade }}>
                {activeSub}
              </div>
              <div style={{ marginTop: 56, display: 'flex', alignItems: 'baseline', gap: 20, fontFamily: BODY }}>
                <div style={{ fontSize: 13, letterSpacing: '0.28em', textTransform: 'uppercase', fontWeight: 700, color: DIM }}>Distance restante</div>
                <div style={{ fontFamily: HELV, fontSize: 48, fontWeight: 700, color: INK, letterSpacing: '-0.02em' }}>{ordersLeft.toFixed(1)}</div>
                <div style={{ fontSize: 14, letterSpacing: '0.18em', textTransform: 'uppercase', fontWeight: 500, color: DIM }}>ordres de grandeur</div>
              </div>
            </div>
            <ScaleRuler logMeters={logNow} label={`${activeName} · ${activeSub}`} />
          </div>
        );
      }}
    </Sprite>
  );
}

  const time = useTime();
  React.useEffect(() => {
    const root = document.querySelector('[data-video-root]');
    if (root) root.setAttribute('data-screen-label', `t=${Math.floor(time)}s`);
  }, [Math.floor(time)]);
  return null;
}

Object.assign(window, {
  SceneTitle, SceneEarth, SceneMoon, SceneSun, SceneJupiter,
  SceneLightSpeed, SceneProxima, SceneGalaxy, SceneUniverse,
  SceneZoomBack, SceneEduLab, SceneOutro,
  EduLabLogo, ComparisonRow, TimestampLabel,
  INK, PAPER, DIM, RULE, HELV, BODY, CYAN, GOLD, PINK,
});
</script>

<!-- ─── App ──────────────────────────────────────────────────────────────── -->
<script type="text/babel">
  const DURATIONS = {
    title:      6,
    earth:      8,
    moon:       9,
    sun:        9,
    jupiter:    9.5,
    lightSpeed: 10,
    proxima:    9.5,
    galaxy:     10,
    universe:   10,
    zoomBack:   11,
    edulab:     12,
    outro:      7,
  };

  const keys = ['title','earth','moon','sun','jupiter','lightSpeed','proxima','galaxy','universe','zoomBack','edulab','outro'];
  const starts = {};
  let t = 0;
  for (const k of keys) { starts[k] = t; t += DURATIONS[k]; }
  const TOTAL = t;

  function App() {
    return (
      <Stage width={1920} height={1080} duration={TOTAL} background={PAPER} persistKey="cosmic-scale">
        <TimestampLabel />
        <SceneTitle       start={starts.title}      dur={DURATIONS.title} />
        <SceneEarth       start={starts.earth}      dur={DURATIONS.earth} />
        <SceneMoon        start={starts.moon}       dur={DURATIONS.moon} />
        <SceneSun         start={starts.sun}        dur={DURATIONS.sun} />
        <SceneJupiter     start={starts.jupiter}    dur={DURATIONS.jupiter} />
        <SceneLightSpeed  start={starts.lightSpeed} dur={DURATIONS.lightSpeed} />
        <SceneProxima     start={starts.proxima}    dur={DURATIONS.proxima} />
        <SceneGalaxy      start={starts.galaxy}     dur={DURATIONS.galaxy} />
        <SceneUniverse    start={starts.universe}   dur={DURATIONS.universe} />
        <SceneZoomBack    start={starts.zoomBack}   dur={DURATIONS.zoomBack} />
        <SceneEduLab      start={starts.edulab}     dur={DURATIONS.edulab} />
        <SceneOutro       start={starts.outro}      dur={DURATIONS.outro} />
      </Stage>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
